version: "3.9"

services:
  postgres:
    # ParadeDB includes pgvector + pg_search (BM25/Tantivy)
    # Replaces pgvector/pgvector:pg16
    # docker-compose.yml
    # The 0.19.11-pg16 tag is built on PostgreSQL 16
    image: paradedb/paradedb:0.19.11-pg16
    container_name: ai-rag-postgres
    restart: always

    environment:
      POSTGRES_DB: ai_rag_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
