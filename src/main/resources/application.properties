# =========================
# PostgreSQL datasource
# =========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ai_rag_assistant}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Run schema/data SQL on startup if you add schema.sql later
spring.sql.init.mode=always

spring.sql.init.schema-locations=classpath:schema.sql

# Disable LangSmith tracing
spring.ai.otel.tracing.enabled=false
# Or if explicitly defined
langchain.smith.enabled=false


# =========================
# LLM provider selection
# =========================
llm.provider=ollama

# =========================
# Ollama chat model
# =========================
ollama.base-url=http://localhost:11434
ollama.model=llama3.1

# ===============================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.1

# =========================
# Ollama embedding model
# =========================
ollama.embedding.model=nomic-embed-text

# =========================
# OpenAI placeholders (leave commented if not using now)
# =========================
#llm.provider=openai
openai.api.key=${OPENAI_API_KEY}
openai.model=gpt-4.1-mini

# ============ spring.ai.openai
#spring.ai.openai.api-key=${OPENAI_API_KEY}
#spring.ai.openai.chat.options.model=gpt-4.1-mini

# ================================
# Judge - Open AI
# ==================================
judge.provider=ollama
# for both generation and Judege llama use the below
#judge.provider=ollama


# enable debug for now
logging.level.com.example.airagassistant=DEBUG

# ???????????????????????????????????????????????????????????????????????
# Add these to your existing application.properties
# ???????????????????????????????????????????????????????????????????????

# IVFFlat probe setting ? controls recall/speed tradeoff
# Higher = better recall, slower queries
# At 100 lists: probes=10 gives ~95% recall, probes=30 gives ~99%
# Applied once per JDBC connection via HikariCP connection-init-sql
spring.datasource.hikari.connection-init-sql=SET ivfflat.probes = 10

# Two-tier retrieval settings
vehicle.search.summary-top-k=10
vehicle.search.detail-top-k=5
vehicle.search.hybrid-vector-weight=0.7

# Bulk ingestion settings
vehicle.bulk.page-size=50
vehicle.bulk.embed-batch-size=32

# Debug logging for new services
logging.level.com.example.airagassistant.rag.retrieval=DEBUG
logging.level.com.example.airagassistant.rag.ingestion=DEBUG
